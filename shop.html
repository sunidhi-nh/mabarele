<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">

    <div class="cart-header">
        <h3>Your Cart</h3>
        <span onclick="closeCart()">✕</span>
    </div>

    <div id="cartItems"></div>

<div class="checkout-bar">
    <div class="total-text">
        Total: ₹<span id="total">0</span>
    </div>

    <button onclick="checkout()">CHECKOUT</button>
</div>

</div>

<!-- POPUP -->
<div id="cartPopup" class="cart-popup">
    ADDED TO CART
</div>

<script src="script.js"></script>
<div id="sizePopup" class="cart-popup">
    SELECT A SIZE
</div>

<div id="quickAddPopup" class="quick-popup">

    <div class="quick-box">
        <span class="close" onclick="closeQuickAdd()">✕</span>

        <h3 id="quickName"></h3>
        <p id="quickPrice"></p>

        <!-- SIZE -->
        <div class="sizes">
            <span onclick="selectQuickSize(this)">XS</span>
            <span onclick="selectQuickSize(this)">S</span>
            <span onclick="selectQuickSize(this)">M</span>
            <span onclick="selectQuickSize(this)">L</span>
        </div>

        <!-- VARIANT -->
        <div class="variants">
            <span onclick="selectQuickVariant(this)">Oversized</span>
            <span onclick="selectQuickVariant(this)">Hoodie</span>
            <span onclick="selectQuickVariant(this)">Regular</span>
        </div>

        <button onclick="confirmQuickAdd()">Add to Cart</button>

    </div>

</div>
